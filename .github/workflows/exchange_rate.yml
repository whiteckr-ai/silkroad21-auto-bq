name: Daily Customs Exchange Rate Update
on:
  workflow_dispatch:
    # cron-job.org 에서 매일 한국 시간 오전 7시 정각에 API로 호출 (시간 정확도 확보)
    # GitHub Actions 자체 schedule: cron 은 서버 부하에 따라 지연될 수 있어 사용하지 않음
jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v3
    - name: 파이썬 3.9 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: 필수 라이브러리 설치 (requests)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: 환율 연동 파이썬 스크립트 실행
      run: python exchange_rate.py
