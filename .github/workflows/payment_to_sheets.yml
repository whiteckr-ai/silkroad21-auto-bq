name: payment-to-sheets

# =====================================================================
# 결제내역 크롤링 -> Google Sheets 업로드 (신규 스프레드시트, DB 미사용)
# 트리거: cron-job.org 외부 스케줄러가 workflow_dispatch API를 호출 (하루 1회)
# =====================================================================

on:
  workflow_dispatch:

concurrency:
  group: payment-to-sheets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas gspread gspread-dataframe google-auth urllib3 openpyxl xlrd

      - name: Restore Google 서비스계정 credentials 파일
        env:
          SERVICE_ACCOUNT_JSON_B64: ${{ secrets.SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON_B64" | base64 -d > service-account.json

      - name: 결제내역 크롤링 -> Sheets 업로드 실행
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
          LOGIN_ID: ${{ secrets.LOGIN_ID }}
          LOGIN_PW: ${{ secrets.LOGIN_PW }}
          PAYMENT_GSHEET_ID: ${{ secrets.PAYMENT_GSHEET_ID }}
        run: python auto_download_payment_to_sheets.py

      - name: 로그 업로드 (실패 시 확인용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-log
          path: log_payment.txt
          retention-days: 7

      - name: 디버그 스크린샷/다운로드폴더 업로드 (실패 시 확인용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-debug
          path: downloads_payment/
          retention-days: 7
          if-no-files-found: ignore
