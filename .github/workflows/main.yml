name: Daily Customs Exchange Rate Update

on:
  schedule:
    # 매일 한국 시간 오전 9시 5분에 실행 (UTC 기준 00:05)
    - cron: '5 0 * * *'
  workflow_dispatch:
    # 수동으로 버튼을 눌러서 즉시 실행해볼 수 있도록 하는 옵션

jobs:
  update-rate:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 파이썬 3.9 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 필수 라이브러리 설치 (requests)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 환율 연동 파이썬 스크립트 실행
      run: python exchange_rate.py
